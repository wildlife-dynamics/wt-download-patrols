id: download_patrols

requirements:
  - name: ecoscope-platform
    version: ">=2.15.0, <2.16.0"
    channel: https://repo.prefix.dev/ecoscope-workflows/
  - name: ecoscope-workflows-ext-custom
    version: "0.1.0rc10"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
  - name: pydeck
    version: 0.9.2
    channel: conda-forge

rjsf-overrides:
  properties:
    Patrol and Event Types.properties.er_patrol_and_events_params.properties.patrol_types.description: >-
      Specify the patrol type(s) to download (optional). Leave this section empty to download all patrol types.
    Patrol and Event Types.properties.er_patrol_and_events_params.properties.event_types.description: >-
      Specify the event type(s) to download (optional). Leave this section empty to download all event types.
    Patrol and Event Types.properties.er_patrol_and_events_params.properties.patrol_types.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: patrol_type
          depends_on: properties.er_client_name.properties.data_source.properties.name
    Patrol and Event Types.properties.er_patrol_and_events_params.properties.event_types.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: event_type
          depends_on: properties.er_client_name.properties.data_source.properties.name

    # --- Patrol and Event Types: event geometry toggle ---
    Patrol and Event Types.properties.er_patrol_and_events_params.properties.include_null_geometry.title: "Include events without a location"

    # --- Filter Data: combined filter config ---
    Filter Data.properties.patrol_filters.title: ""
    Filter Data.properties.patrol_filters.properties.bounding_box.title: "Bounding Box"
    Filter Data.properties.patrol_filters.properties.bounding_box.description: >-
      Only include patrol observations and events whose coordinates fall inside this
      bounding box. Applies to BOTH the patrol trajectories and the patrol events.
    Filter Data.properties.patrol_filters.properties.filter_point_coords.title: "Filter Exact Point Coordinates"
    Filter Data.properties.patrol_filters.properties.filter_point_coords.description: >-
      Exclude observations and events recorded at these exact coordinates (e.g. known
      bad GPS fixes). Applies to BOTH the patrol trajectories and the patrol events.
    Filter Data.properties.patrol_filters.properties.trajectory_segment_filter.title: "Trajectory Filter"
    Filter Data.properties.patrol_filters.properties.trajectory_segment_filter.description: >-
      Drop trajectory segments outside these length / time / speed bounds (e.g. to remove
      implausible jumps). Applies to the patrol trajectories only.

    # --- Trajectory Style: color column var ---
    set_patrol_traj_color_column.description: "Differentiate tracks by color using the selected category."
    set_patrol_traj_color_column.properties.var.title: "Category"
    set_patrol_traj_color_column.properties.var.default: "patrol_subject"
    set_patrol_traj_color_column.properties.var.oneOf: [
      {"const": "patrol_type", "title": "Patrol Type"},
      {"const": "patrol_status", "title": "Patrol Status"},
      {"const": "patrol_subject", "title": "Patrol Subject"},
      {"const": "patrol_serial_number", "title": "Patrol Serial Number"},
    ]

    # --- Group Data: grouper override ---
    Group Data.properties.groupers.title: ""
    Group Data.properties.groupers.properties.groupers.description: ""
    Group Data.properties.groupers.properties.groupers.items.anyOf:
      - {"$ref": "#/$defs/ValueGrouper"}
      - {"$ref": "#/$defs/TemporalGrouper"}

    # --- Refine Patrol Data: Remove Columns ---
    Refine Patrol Data.properties.customize_columns_traj.properties.drop_columns.title: " "
    Refine Patrol Data.properties.customize_columns_traj.properties.drop_columns.items.title: "Column Name"
    Refine Patrol Data.properties.customize_columns_traj.properties.drop_columns.description: >-
      Columns listed here will be left out of both the generated map and your download.
      If you're not sure, try running the workflow first to see all available columns.
    # --- Refine Patrol Data: trajectory SQL query ---
    Refine Patrol Data.properties.sql_query_traj.properties.query.title: "SQL Query"
    Refine Patrol Data.properties.sql_query_traj.properties.query.description: >-
      Write a SQL query to filter or transform your data. Leave blank to skip this step. Use df as the table name (e.g., SELECT * FROM df WHERE status = 'active'). Note that queries only apply to your downloaded files and not the generated map.

    # --- Generate Maps: positive maps toggle ---
    Generate Maps.properties.generate_maps.title: ""
    Generate Maps.properties.generate_maps.properties.value.title: "Generate maps in dashboard"
    Generate Maps.properties.generate_maps.properties.value.default: true
    Generate Maps.properties.generate_maps.properties.value.description: ""
    Generate Maps.properties.base_map_defs.properties.base_maps.title: "Map Base Layers"

    # --- Persist ---
    persist_patrol_traj.properties.filename_prefix.default: "patrol_trajectories"
    persist_patrol_traj.properties.filetypes.default: ["parquet"]
    persist_patrol_traj.properties.filetypes.items.enum: ["csv", "parquet"]
    persist_patrol_events.properties.filename_prefix.default: "patrol_events"
    persist_patrol_events.properties.filetypes.default: ["parquet"]
    persist_patrol_events.properties.filetypes.items.enum: ["csv", "parquet"]

  $defs:
    ValueGrouper:
      title: "Category"
      type: "object"
      properties:
        index_name:
          title: "Index Name"
          type: "string"
          oneOf:
            - const: "patrol_serial_number"
              title: "Patrol Serial Number"
            - const: "patrol_type"
              title: "Patrol Type"
            - const: "patrol_subject"
              title: "Patrol Subject"

  uiSchema:
    # Per-item helper → renders below each input box (inside the bordered item card),
    # not on the array as a whole (ArrayFieldTemplate does not render array-level help).
    Patrol and Event Types.er_patrol_and_events_params.patrol_types.items.ui:help: >-
      If you are on Ecoscope Desktop, "Patrol Type" values can be found in your EarthRanger Admin site under Activity → Patrol Types.
    Patrol and Event Types.er_patrol_and_events_params.event_types.items.ui:help: >-
      If you are on Ecoscope Desktop, "Event Type" values can be found in your EarthRanger Admin site under Activity → Event Types.
    Patrol and Event Types.er_patrol_and_events_params.include_null_geometry.ui:help: >-
      Events without coordinates (point or area) will still appear in your download.
    Filter Data.patrol_filters.filter_point_coords.items.ui:options.label: false
    Generate Maps.base_map_defs.base_maps.items.ui:options.label: false
    Generate Maps.generate_maps.value.ui:help: >-
      Not recommended for large datasets to improve performance.
    ui:order:
      - workflow_details
      - er_client_name
      - time_range
      - Patrol and Event Types
      - Filter Data
      - Group Data
      - Refine Patrol Data
      - persist_patrol_traj
      - persist_patrol_events
      - set_patrol_traj_color_column
      - Generate Maps

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped

workflow:
  - name: Workflow Details
    id: workflow_details
    task: set_workflow_details

  - name: Data Source
    id: er_client_name
    task: set_er_connection

  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: '%d %b %Y %H:%M:%S %Z'

  - title: Patrol and Event Types
    type: task-group
    description: " "
    tasks:
      - id: er_patrol_and_events_params
        task: set_patrols_and_patrol_events_params
        partial:
          client: ${{ workflow.er_client_name.return }}
          time_range: ${{ workflow.time_range.return }}
          include_patrol_details: true
          raise_on_empty: false
          truncate_to_time_range: true
          sub_page_size: 100
      - id: prefetch_patrols
        task: get_patrols_from_combined_params
        partial:
          combined_params: ${{ workflow.er_patrol_and_events_params.return }}
      - id: patrol_obs
        task: get_patrol_observations_from_patrols_df_and_combined_params
        partial:
          patrols_df: ${{ workflow.prefetch_patrols.return }}
          combined_params: ${{ workflow.er_patrol_and_events_params.return }}
      - id: patrol_events
        task: unpack_events_from_patrols_df_and_combined_params
        partial:
          patrols_df: ${{ workflow.prefetch_patrols.return }}
          combined_params: ${{ workflow.er_patrol_and_events_params.return }}
      - id: event_type_display_names
        task: get_event_type_display_names_from_events
        partial:
          client: ${{ workflow.er_client_name.return }}
          events_gdf: ${{ workflow.patrol_events.return }}
          append_category_names: "duplicates"

  - name: Extract Timezone Selection
    id: get_timezone
    task: get_timezone_from_time_range
    partial:
      time_range: ${{ workflow.time_range.return }}

  - name: Convert Patrol Observations to Timezone
    id: convert_patrols_to_user_timezone
    task: convert_values_to_timezone
    partial:
      df: ${{ workflow.patrol_obs.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns: ["fixtime"]

  - name: Convert Patrol Events to Timezone
    id: convert_events_to_user_timezone
    task: convert_values_to_timezone
    partial:
      df: ${{ workflow.patrol_events.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns: ["time"]

  # === FILTER DATA ===
  - title: Filter Data
    type: task-group
    description: >-
      Filter patrol trajectories and events by location (bounding box + excluded points)
      and by trajectory segment length, duration, and speed. Data outside these bounds is
      removed, reducing noise and focusing on meaningful movement patterns.
    tasks:
      - name: Filters
        id: patrol_filters
        task: set_traj_filters

  # --- Combined-filter splitters ---
  - name: Split Bounding Box
    id: bounding_box
    task: get_bounding_box
    partial:
      filters: ${{ workflow.patrol_filters.return }}

  - name: Split Point Coordinates
    id: filter_point_coords
    task: get_filter_point_coords
    partial:
      filters: ${{ workflow.patrol_filters.return }}

  - name: Split Segment Filter
    id: segment_filter
    task: get_segment_filter
    partial:
      filters: ${{ workflow.patrol_filters.return }}

  # --- Trajectory branch ---
  - name: Remove Column Prefix Extra (Observations)
    id: drop_extra_prefix_obs
    task: drop_column_prefix
    partial:
      df: ${{ workflow.convert_patrols_to_user_timezone.return }}
      prefix: "extra__"
      duplicate_strategy: "suffix"

  - name: Filter Observation Relocations
    id: filter_patrol_obs
    task: apply_reloc_coord_filter
    partial:
      df: ${{ workflow.drop_extra_prefix_obs.return }}
      bounding_box: ${{ workflow.bounding_box.return }}
      filter_point_coords: ${{ workflow.filter_point_coords.return }}
      roi_gdf: null
      roi_name: null
      reset_index: false

  - name: Build Patrol Trajectories
    id: patrol_traj
    task: relocations_to_trajectory
    partial:
      relocations: ${{ workflow.filter_patrol_obs.return }}
      trajectory_segment_filter: ${{ workflow.segment_filter.return }}

  - name: Remove Column Prefix Extra (Trajectories)
    id: drop_extra_prefix_traj
    task: drop_column_prefix
    partial:
      df: ${{ workflow.patrol_traj.return }}
      prefix: "extra__"
      duplicate_strategy: "suffix"

  - name: Internally Process Columns
    id: customize_columns_internally
    task: map_columns
    partial:
      df: ${{ workflow.drop_extra_prefix_traj.return }}
      rename_columns: {}
      drop_columns: ["id"]
      retain_columns: []
      raise_if_not_found: false

  # --- Events branch ---
  - name: Remove Column Prefix Extra (Events)
    id: drop_extra_prefix_events
    task: drop_column_prefix
    partial:
      df: ${{ workflow.convert_events_to_user_timezone.return }}
      prefix: "extra__"
      duplicate_strategy: "suffix"

  - name: Apply Coordinate Filter to Patrol Events
    id: filter_patrol_events
    task: apply_reloc_coord_filter
    partial:
      df: ${{ workflow.drop_extra_prefix_events.return }}
      bounding_box: ${{ workflow.bounding_box.return }}
      filter_point_coords: ${{ workflow.filter_point_coords.return }}
      roi_gdf: null
      roi_name: null
      reset_index: true

  # === TRAJECTORY STYLE ===
  - name: Trajectory Category
    id: set_patrol_traj_color_column
    task: set_string_var

  # === GROUP DATA ===
  - title: Group Data
    type: task-group
    description: >-
      Configure how patrols and events are grouped (by category or temporal index) and
      split into per-group datasets for export and mapping.
    tasks:
      - name: Group Data
        id: groupers
        task: set_groupers

      - name: Add temporal index to Patrol Trajectories
        id: traj_add_temporal_index
        task: add_temporal_index
        partial:
          df: ${{ workflow.customize_columns_internally.return }}
          time_col: "segment_start"
          groupers: ${{ workflow.groupers.return }}
          cast_to_datetime: true
          format: "mixed"

      - name: Rename value grouper columns for Trajectories
        id: traj_rename_grouper_columns
        task: map_columns
        partial:
          df: ${{ workflow.traj_add_temporal_index.return }}
          drop_columns: ["patrol_type"]
          retain_columns: []
          raise_if_not_found: false
          rename_columns:
            patrol_type__value: "patrol_type"

      - name: Patrol Traj Colormap
        id: traj_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.traj_rename_grouper_columns.return }}
          colormap: ["#FF9600", "#F23B0E", "#A100CB", "#F04564", "#03421A", "#3089FF", "#E26FFF", "#8C1700", "#002960", "#FFD000", "#B62879", "#680078", "#005A56", "#0056C7", "#331878", "#E76826"]
          input_column_name: ${{ workflow.set_patrol_traj_color_column.return }}
          output_column_name: "patrol_traj_colormap"

      - name: Add temporal index to Patrol Events
        id: pe_add_temporal_index
        task: add_temporal_index
        partial:
          df: ${{ workflow.filter_patrol_events.return }}
          time_col: "patrol_start_time"
          groupers: ${{ workflow.groupers.return }}
          cast_to_datetime: true
          format: "mixed"

      - name: Patrol Events Colormap
        id: pe_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.pe_add_temporal_index.return }}
          input_column_name: "event_type"
          colormap: "tab20b"
          output_column_name: "event_type_colormap"

      - name: Cast Patrol Trajectory Columns
        id: patrol_traj_cols_to_string
        task: convert_column_values_to_string
        partial:
          df: ${{ workflow.traj_colormap.return }}
          columns: ["patrol_serial_number", "patrol_type"]

      - name: Cast Patrol Events Columns
        id: pe_cols_to_string
        task: convert_column_values_to_string
        partial:
          df: ${{ workflow.pe_colormap.return }}
          columns: ["patrol_serial_number", "patrol_type"]

      - name: Split Patrol Trajectories by Group
        id: split_patrol_traj_groups
        task: split_groups
        partial:
          df: ${{ workflow.patrol_traj_cols_to_string.return }}
          groupers: ${{ workflow.groupers.return }}

      - name: Split Patrol Events by Group
        id: split_pe_groups
        task: split_groups
        partial:
          df: ${{ workflow.pe_cols_to_string.return }}
          groupers: ${{ workflow.groupers.return }}

  # === REFINE PATROL DATA ===
  - title: Refine Patrol Data
    type: task-group
    description: >-
      Reshape and organize your patrol trajectory data before downloading.
    tasks:
      - name: Remove Columns
        id: customize_columns_traj
        task: map_columns
        partial:
          rename_columns: {}
          retain_columns: []
          raise_if_not_found: false
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.split_patrol_traj_groups.return }}

      - name: Apply SQL Query
        id: sql_query_traj
        task: apply_sql_query
        partial:
          sanitize: true
          columns: null
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.customize_columns_traj.return }}

  - name: Patrol Track Download File Format
    id: persist_patrol_traj
    task: persist_grouped_dfs_for_results_download
    partial:
      grouped_dfs: ${{ workflow.sql_query_traj.return }}
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      sanitize: true
    skipif:
      conditions:
        - never

  - name: Event Download File Format
    id: persist_patrol_events
    task: persist_grouped_dfs_for_results_download
    partial:
      grouped_dfs: ${{ workflow.split_pe_groups.return }}
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      sanitize: true
    skipif:
      conditions:
        - never

  - title: Generate Maps
    type: task-group
    description: >-
      Generate maps to visualize patrol trajectories and events.
    tasks:
      - name: Generate Maps in Dashboard
        id: generate_maps
        task: invert_bool

      - name: ""
        id: skip_traj_map
        task: maybe_skip_df
        partial:
          skip: ${{ workflow.generate_maps.return }}
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.customize_columns_traj.return }}

      - name: ""
        id: skip_event_map
        task: maybe_skip_df
        partial:
          skip: ${{ workflow.generate_maps.return }}
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.split_pe_groups.return }}

      - name: "Set Patrol Map Title"
        id: set_patrol_map_title
        task: set_string_var
        partial:
          var: "Patrol Trajectories and Events Map"

      - name: " "
        id: base_map_defs
        task: set_base_maps

      - name: Rename Trajectory Columns for Display
        id: rename_traj_display_columns
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          raise_if_not_found: false
          rename_columns:
            patrol_serial_number: "Patrol Serial"
            patrol_type__display: "Patrol Type"
            segment_start: "Start Time"
            timespan_seconds: "Duration (s)"
            speed_kmhr: "Speed (kph)"
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.skip_traj_map.return }}

      - name: Rename Event Columns for Display
        id: rename_event_display_columns
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          raise_if_not_found: false
          rename_columns:
            patrol_serial_number: "Patrol Serial"
            event_type: "Event Type"
            time: "Event Time"
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.skip_event_map.return }}

      - name: Create Trajectory Map Layers
        id: patrol_traj_map_layers
        task: create_polyline_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          layer_style:
            get_width: 3
            width_units: "pixels"
            color_column: "patrol_traj_colormap"
          legend:
            label_column: ${{ workflow.set_patrol_traj_color_column.return }}
            color_column: "patrol_traj_colormap"
          tooltip_columns: ["Patrol Serial", "Patrol Type", "Start Time", "Duration (s)", "Speed (kph)"]
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.rename_traj_display_columns.return }}

      - name: Create Event Map Layers
        id: patrol_events_map_layers
        task: create_point_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          layer_style:
            fill_color_column: "event_type_colormap"
            get_radius: 5
          legend: null
          tooltip_columns: ["Patrol Serial", "Event Type", "Event Time"]
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.rename_event_display_columns.return }}

      - name: Combine Trajectories and Patrol Events Layers
        id: combined_traj_and_pe_map_layers
        task: groupbykey_passthrough_skip
        skipif:
          conditions:
            - never
          unpack_depth: 1
        partial:
          iterables:
            - ${{ workflow.patrol_traj_map_layers.return }}
            - ${{ workflow.patrol_events_map_layers.return }}

      - name: Draw Ecomaps
        id: traj_patrol_events_ecomap
        task: draw_ecomap
        partial:
          title: null
          tile_layers: ${{ workflow.base_map_defs.return }}
          north_arrow_style:
            placement: "top-left"
          legend_style:
            title: ${{ workflow.set_patrol_traj_color_column.return }}
            format_title: true
            placement: "bottom-right"
          static: false
          max_zoom: 20
          widget_id: ${{ workflow.set_patrol_map_title.return }}
        mapvalues:
          argnames: geo_layers
          argvalues: ${{ workflow.combined_traj_and_pe_map_layers.return }}

      - name: Persist Ecomaps
        id: traj_pe_ecomap_html_urls
        task: persist_text
        partial:
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
        mapvalues:
          argnames: text
          argvalues: ${{ workflow.traj_patrol_events_ecomap.return }}

      - name: Create Ecomap Widgets
        id: traj_pe_map_widgets_single_views
        task: create_map_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.set_patrol_map_title.return }}
        map:
          argnames: [view, data]
          argvalues: ${{ workflow.traj_pe_ecomap_html_urls.return }}

      - name: Merge Ecomap Views
        id: traj_pe_grouped_map_widget
        task: merge_widget_views
        partial:
          widgets: ${{ workflow.traj_pe_map_widgets_single_views.return }}

  - name: Create Dashboard with Patrol Map Widgets
    id: patrol_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return }}
      widgets:
        - ${{ workflow.traj_pe_grouped_map_widget.return }}
      groupers: ${{ workflow.groupers.return }}
      time_range: ${{ workflow.time_range.return }}
